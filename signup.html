<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | SoloForge Client Portal</title>
  <link rel="icon" href="./assets/images/logo.png?v=18" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="css/consulting.css?v=21" rel="stylesheet">
  <style>body{font-family:Inter,sans-serif}</style>
</head>
<body data-page="signup">
  <div id="site-nav"></div>
  <main class="auth-wrap">
    <div class="container">
      <div class="row g-5 align-items-center">
        <div class="col-lg-6 d-none d-lg-block">
          <div class="auth-visual">
            <img src="./assets/images/page-careers.jpg?v=5" alt="SoloForge engineers building enterprise software">
            <div class="auth-visual__overlay">
              <p class="auth-visual__label">Join SoloForge</p>
              <p class="auth-visual__text">Create your portal account to collaborate with our delivery teams and track project milestones.</p>
            </div>
          </div>
        </div>
        <div class="col-lg-5 ms-lg-auto">
          <div class="auth-box">
            <div class="auth-brand-lockup">
              <img src="./assets/images/logo.png?v=18" alt="" class="auth-brand-mark" height="48" onerror="this.onerror=null;this.src='./assets/images/logo-icon.svg?v=18'">
              <span class="auth-brand-name">SoloForge</span>
            </div>
            <h1 class="h4 text-center">Create your account</h1>
            <p class="text-muted text-center small mb-4">Get started with the SoloForge client portal</p>

            <div class="auth-sso">
              <button type="button" class="auth-sso-btn" data-sso="google">
                <i class="fa-brands fa-google" aria-hidden="true"></i>
                Continue with Google
              </button>
              <button type="button" class="auth-sso-btn" data-sso="microsoft">
                <i class="fa-brands fa-microsoft" aria-hidden="true"></i>
                Continue with Microsoft
              </button>
            </div>

            <div class="auth-divider" role="presentation"><span>or register with email</span></div>

            <form id="signupForm">
              <div class="mb-3"><label class="form-label small">Work Email</label><input type="email" class="form-control" name="email" autocomplete="email" required></div>
              <div class="mb-3"><label class="form-label small">Company</label><input class="form-control" name="company" autocomplete="organization"></div>
              <div class="mb-3"><label class="form-label small">Password</label><input type="password" class="form-control" name="password" autocomplete="new-password" required minlength="8"></div>
              <div class="form-check mb-3"><input class="form-check-input" type="checkbox" required id="terms"><label class="form-check-label small" for="terms">I agree to <a href="terms.html">SoloForge Terms</a></label></div>
              <button type="submit" class="btn-primary-sf w-100">Create Account</button>
            </form>
            <p class="text-center small mt-4 mb-0"><a href="signin.html">Already have an account?</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/layout.js?v=19"></script>
  <script src="js/main.js"></script>
</body>
</html>
